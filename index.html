<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>スイング動画編集ツール</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Yu Gothic UI", "Hiragino Sans", "Meiryo", sans-serif;
    background: #1a1f2b; color: #e8ecf3;
    margin: 0; padding: 24px;
    display: flex; justify-content: center;
  }
  .app { width: 100%; max-width: 900px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: #93a0b5; font-size: 13px; margin-bottom: 20px; }
  .drop {
    display: block;
    border: 2px dashed #4a5670; border-radius: 12px;
    padding: 40px 24px; text-align: center; cursor: pointer;
    transition: background .15s, border-color .15s;
    font-size: 16px; color: #b8c2d4;
  }
  .drop.over { background: #26314a; border-color: #6ea8ff; }
  .drop input { display: none; }
  .videowrap { position: relative; margin-top: 16px; }
  video { width: 100%; border-radius: 10px; background: #000; display: block; }
  #overlayCanvas {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  .panel {
    background: #232a3a; border-radius: 12px; padding: 16px 20px;
    margin-top: 14px;
  }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 8px 0; }
  .label { width: 110px; color: #93a0b5; font-size: 14px; }
  .time { font-size: 20px; font-variant-numeric: tabular-nums; min-width: 110px; }
  button {
    background: #33405c; color: #e8ecf3; border: none; border-radius: 8px;
    padding: 9px 16px; font-size: 14px; cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: #3f4f72; }
  button.small { padding: 6px 10px; font-size: 12px; }
  button.primary { background: #2f7d4f; font-size: 16px; padding: 12px 28px; }
  button.primary:hover { background: #38955e; }
  button.accent { background: #3a5e9e; }
  button.accent:hover { background: #4570bb; }
  button:disabled { opacity: .45; cursor: default; }
  select {
    background: #33405c; color: #e8ecf3; border: none; border-radius: 8px;
    padding: 8px 10px; font-size: 14px; font-family: inherit;
  }
  .status { margin-top: 14px; font-size: 15px; min-height: 24px; }
  .status.ok { color: #6fd695; }
  .status.err { color: #ff8a8a; white-space: pre-wrap; }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 3px solid #4a5670; border-top-color: #6ea8ff;
    border-radius: 50%; animation: spin .8s linear infinite;
    vertical-align: -3px; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none; }
  .badge {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,.65); color: #ffd76e; padding: 4px 12px;
    border-radius: 6px; font-size: 15px; pointer-events: none;
  }
  #queue { margin-top: 14px; }
  .qrow {
    display: flex; align-items: center; gap: 12px;
    background: #232a3a; border-radius: 10px;
    padding: 10px 14px; margin-bottom: 6px; cursor: pointer;
    border: 2px solid transparent; font-size: 14px;
  }
  .qrow:hover { background: #293145; }
  .qrow.active { border-color: #6ea8ff; }
  .qname { flex: 1; word-break: break-all; }
  .qrange { color: #6fd695; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .qstat { color: #93a0b5; white-space: nowrap; font-size: 13px; }
  .qdel { background: none; padding: 2px 8px; color: #93a0b5; font-size: 16px; }
  .qdel:hover { color: #ff8a8a; background: none; }
  .hint { color: #93a0b5; font-size: 13px; }
  .progressbar {
    height: 10px; background: #33405c; border-radius: 5px;
    overflow: hidden; margin-top: 10px;
  }
  .progressbar > div {
    height: 100%; width: 0%; background: #38955e; transition: width .2s;
  }
  a.dl {
    display: inline-block; background: #2f7d4f; color: #fff;
    padding: 12px 28px; border-radius: 8px; font-size: 16px;
    text-decoration: none; margin-top: 8px;
  }
  @media (max-width: 640px) {
    body { padding: 12px; }
    h1 { font-size: 18px; }
    .drop { padding: 28px 12px; font-size: 14px; }
    .panel { padding: 12px; }
    .label { width: 100%; }
    button { padding: 10px 14px; }
    button.small { padding: 8px 10px; }
    .time { font-size: 17px; min-width: 90px; }
    .qrow { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>⛳ スイング動画編集ツール <span style="font-size:12px;color:#93a0b5">v21</span></h1>
  <div class="sub">ゴルフスイングを自動検出し、「通常速度 → スロー再生(ガイド線付き)」の動画を作成します。複数の動画は1本に連結されます。動画はどこにも送信されず、すべてこの端末の中で処理されます。</div>

  <label class="drop" id="drop">
    📂 ここに動画をドラッグ&ドロップ、またはタップして選択(複数可)
    <input type="file" id="file" accept="video/*" multiple>
  </label>

  <div id="queue"></div>

  <div id="editor" class="hidden">
    <div class="videowrap">
      <video id="video" controls playsinline></video>
      <canvas id="overlayCanvas"></canvas>
      <div class="badge hidden" id="badge"></div>
      <div id="pickLayer" class="hidden"
           style="position:absolute;inset:0;z-index:5;cursor:crosshair;background:rgba(20,40,80,0.12);touch-action:none">
        <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#ffd76e;padding:8px 16px;border-radius:8px;font-size:14px;white-space:nowrap">⛳ ボールをタップ/ドラッグで線を調整</div>
        <button id="pickDone"
                style="position:absolute;top:8px;right:8px;background:#2f7d4f;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:14px;font-family:inherit;opacity:0.9">✓ 完了</button>
      </div>
    </div>

    <div class="panel">
      <div class="row">
        <button class="accent" id="detect">🔍 スイングを再検出</button>
        <button id="nextCand" class="hidden">↪ 別の候補を試す</button>
        <button id="showLines">📏 線を今すぐ表示</button>
        <button id="pickBall">🎯 ボール位置を指定</button>
        <span class="hint">「線を今すぐ表示」で書き出し前に線を確認できます。ズレていたら「ボール位置を指定」でボールをタップ</span>
      </div>
      <div class="row">
        <span class="label">スイング開始</span>
        <span class="time" id="startTime">--:--.--</span>
        <button class="accent" id="setStart">▶ 今の位置に設定</button>
        <button class="small" data-adj="start" data-d="-0.5">-0.5秒</button>
        <button class="small" data-adj="start" data-d="-0.1">-0.1秒</button>
        <button class="small" data-adj="start" data-d="0.1">+0.1秒</button>
        <button class="small" data-adj="start" data-d="0.5">+0.5秒</button>
      </div>
      <div class="row">
        <span class="label">スイング終了</span>
        <span class="time" id="endTime">--:--.--</span>
        <button class="accent" id="setEnd">⏹ 今の位置に設定</button>
        <button class="small" data-adj="end" data-d="-0.5">-0.5秒</button>
        <button class="small" data-adj="end" data-d="-0.1">-0.1秒</button>
        <button class="small" data-adj="end" data-d="0.1">+0.1秒</button>
        <button class="small" data-adj="end" data-d="0.5">+0.5秒</button>
      </div>
      <div class="row">
        <span class="label">スロー速度</span>
        <select id="speed">
          <option value="0.25">0.25倍速</option>
          <option value="0.5" selected>0.5倍速</option>
          <option value="0.75">0.75倍速</option>
        </select>
        <button id="preview">🔁 仕上がりプレビュー</button>
      </div>
      <div class="row">
        <span class="label">自動ズーム</span>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="zoom" checked style="width:18px;height:18px">
          <span class="hint">小さく映っている人物を拡大して画面中央に配置</span>
        </label>
      </div>
      <div class="row">
        <span class="label">ガイド線</span>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="guides" checked style="width:18px;height:18px">
          <span class="hint">スロー再生時に赤いガイド線を表示(動画ごとの設定は一覧のプルダウン)</span>
        </label>
      </div>
      <div class="row" style="margin-top:16px">
        <button class="primary" id="export">💾 動画を作成する</button>
      </div>
      <div class="progressbar hidden" id="pbar"><div id="pfill"></div></div>
      <div class="status" id="status"></div>
      <div id="result"></div>
    </div>
  </div>
</div>
<script src="lib/mp4box.all.min.js"></script>
<script src="remux.js?v=21"></script>
<script type="module" src="app.js?v=21"></script>
</body>
</html>
